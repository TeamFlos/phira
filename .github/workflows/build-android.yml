name: Build Android Phira

on:
  workflow_dispatch:
  push:
    branches:
      - replay
      - main

env:
  CARGO_TERM_COLOR: always
  ANDROID_HOME: ${{ github.workspace }}/android-sdk
  ANDROID_NDK_HOME: ${{ github.workspace }}/android-ndk-r27c
  ANDROID_NDK_ROOT: ${{ github.workspace }}/android-ndk-r27c
  # Tag of the prpr-avc-ffmpeg release that ships matching prebuilt static libs.
  # Bump this together with prpr-avc to keep ABI in sync.
  PRPR_AVC_FFMPEG_VERSION: 20260408_v0

jobs:
  build:
    name: Build (aarch64-linux-android)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install host build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            libssl-dev \
            pkg-config \
            unzip \
            curl

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Android SDK Tools
        run: |
          mkdir -p "$ANDROID_HOME"
          curl -fL --retry 3 \
            -o cmdline-tools.zip \
            https://dl.google.com/android/repository/commandlinetools-linux-8512546_latest.zip
          unzip -q cmdline-tools.zip -d "$ANDROID_HOME"
          rm cmdline-tools.zip
          # Accept SDK licenses non-interactively.
          yes | "$ANDROID_HOME/cmdline-tools/bin/sdkmanager" --sdk_root="$ANDROID_HOME" --licenses >/dev/null
          "$ANDROID_HOME/cmdline-tools/bin/sdkmanager" --sdk_root="$ANDROID_HOME" \
            "platform-tools" "build-tools;33.0.2" "platforms;android-35"

      - name: Install Android NDK r27c
        run: |
          curl -fL --retry 3 \
            -o android-ndk.zip \
            https://dl.google.com/android/repository/android-ndk-r27c-linux.zip
          unzip -q android-ndk.zip -d "${{ github.workspace }}"
          rm android-ndk.zip

      - name: Install stable Rust (for cargo-ndk)
        uses: dtolnay/rust-toolchain@stable

      - name: Install project toolchain + Android target
        # rust-toolchain.toml pins the project's compiler. Make sure that
        # toolchain is fully installed and has the Android target available
        # so cargo-ndk can cross-compile against it.
        working-directory: ${{ github.workspace }}
        run: |
          rustup show active-toolchain || rustup toolchain install --profile minimal
          rustup target add aarch64-linux-android
          rustup show

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: "true"
          cache-all-crates: "true"
          shared-key: android-aarch64

      - name: Download prpr-avc static libs (aarch64-linux-android)
        run: |
          mkdir -p prpr-avc/static-lib/aarch64-linux-android
          curl -fL --retry 3 \
            -o prpr-avc-static-lib.tar.gz \
            "https://github.com/TeamFlos/prpr-avc-ffmpeg/releases/download/${PRPR_AVC_FFMPEG_VERSION}/aarch64-linux-android.tar.gz"
          tar -xzf prpr-avc-static-lib.tar.gz -C prpr-avc/static-lib/aarch64-linux-android
          rm prpr-avc-static-lib.tar.gz

      - name: Install cargo-ndk
        run: cargo +stable install --locked cargo-ndk

      - name: Build phira (aarch64-linux-android, release)
        working-directory: phira
        run: cargo ndk -t arm64-v8a --platform 35 build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libphira-aarch64-android
          path: target/aarch64-linux-android/release/libphira.so
          if-no-files-found: error
